<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaart-E Display</title>
  <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }
    #media-container {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    video, img {
      max-width: 100%; max-height: 100%;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #logo-screen {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 100%;
      background: #0a0a0a;
    }
    #logo-screen img { max-width: 300px; object-fit: contain; }
    #status {
      position: fixed; bottom: 8px; right: 8px;
      font-size: 11px; color: rgba(255,255,255,0.3);
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="media-container">
    <div id="logo-screen">
      <img src="/logo.png" alt="Vaart-E" />
    </div>
  </div>
  <div id="audio-gate" style="display:none;position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:24px;">
    <button id="audio-gate-btn" style="border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;border-radius:32px;padding:22px 34px;max-width:420px;text-align:center;">
      <div style="font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:#cbd5e1;">Audio required</div>
      <div style="margin-top:12px;font-size:28px;font-weight:700;">Start playback with audio</div>
      <div style="margin-top:10px;font-size:14px;color:#cbd5e1;">Browser blocked autoplay. Tap once to enable video sound.</div>
    </button>
  </div>
  <div id="status">Connecting...</div>

  <script>
    const params = new URLSearchParams(window.location.search)
    const SERIAL = params.get('serial')
    const SUB_SERIAL = params.get('sub')
    const API_BASE = params.get('api') || 'https://app.vaarte.in'
    const PUSHER_KEY = '__PUSHER_KEY__'
    const PUSHER_CLUSTER = '__PUSHER_CLUSTER__'

    let playlist = []
    let currentIndex = 0
    let ambientEl = null
    let primaryEl = null

    const container = document.getElementById('media-container')
    const statusEl = document.getElementById('status')
    const audioGate = document.getElementById('audio-gate')
    const audioGateBtn = document.getElementById('audio-gate-btn')

    async function fetchContent() {
      try {
        const res = await fetch(`${API_BASE}/api/display/content`, {
          headers: {
            'X-Serial': SERIAL,
            'X-SubSerial': SUB_SERIAL,
          }
        })
        if (!res.ok) { showLogo(); return }
        const data = await res.json()
        if (data.playlist && data.playlist.length > 0) {
          loadPlaylist(data.playlist)
        } else {
          showLogo()
        }
      } catch (e) {
        showLogo()
      }
    }

    const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER })
    const channel = pusher.subscribe(`tv-${SERIAL}-${SUB_SERIAL}`)

    channel.bind('content-update', (data) => {
      statusEl.textContent = 'Content updated'
      loadPlaylist(data.playlist)
    })

    channel.bind('clear-content', () => {
      playlist = []
      showLogo()
    })

    pusher.connection.bind('connected', () => statusEl.textContent = `Online · ${SUB_SERIAL}`)
    pusher.connection.bind('disconnected', () => statusEl.textContent = 'Reconnecting...')

    function sortByOrder(items) {
      return [...items].sort((a, b) => a.order - b.order)
    }

    function getAmbientItem() {
      return sortByOrder(playlist).find((item) => item.playbackLayer === 'AMBIENT') || null
    }

    function getPrimaryItems() {
      return sortByOrder(playlist).filter((item) => item.playbackLayer !== 'AMBIENT')
    }

    function loadPlaylist(items) {
      playlist = sortByOrder(items)
      currentIndex = 0
      renderAmbient()
      playNext()
    }

    function playNext() {
      const primaryItems = getPrimaryItems()
      if (!primaryItems.length) { showLogo(); return }
      const item = primaryItems[currentIndex % primaryItems.length]
      currentIndex++
      playItem(item)
    }

    function setAmbientVolume(ducked) {
      const ambientItem = getAmbientItem()
      if (!ambientEl || !ambientItem) return
      const base = Math.max(0, Math.min(1, (ambientItem.volumePercent ?? 100) / 100))
      ambientEl.volume = ducked ? base * 0.2 : base
    }

    function renderAmbient() {
      if (ambientEl) {
        ambientEl.remove()
        ambientEl = null
      }

      const ambientItem = getAmbientItem()
      if (!ambientItem) return

      if (ambientItem.type === 'VIDEO') {
        const video = document.createElement('video')
        video.src = ambientItem.url
        video.autoplay = true
        video.loop = true
        video.playsInline = true
        video.style.position = 'fixed'
        video.style.inset = '0'
        video.style.width = '100%'
        video.style.height = '100%'
        video.style.objectFit = 'cover'
        video.style.opacity = '0.35'
        video.style.zIndex = '0'
        video.volume = Math.max(0, Math.min(1, (ambientItem.volumePercent ?? 100) / 100))
        document.body.appendChild(video)
        ambientEl = video
        tryPlay(video)
        return
      }

      if (ambientItem.type === 'AUDIO') {
        const audio = document.createElement('audio')
        audio.src = ambientItem.url
        audio.autoplay = true
        audio.loop = true
        audio.preload = 'auto'
        audio.volume = Math.max(0, Math.min(1, (ambientItem.volumePercent ?? 100) / 100))
        document.body.appendChild(audio)
        ambientEl = audio
        tryPlay(audio)
      }
    }

    async function tryPlay(el) {
      try {
        await el.play()
        audioGate.style.display = 'none'
        statusEl.textContent = `Online · ${SUB_SERIAL}`
      } catch (e) {
        audioGate.style.display = 'flex'
        statusEl.textContent = 'Audio blocked - tap screen once'
      }
    }

    function playItem(item) {
      container.innerHTML = ''
      primaryEl = null
      const shouldDuck = item.duckAmbient && (item.type === 'VIDEO' || item.type === 'AUDIO')
      setAmbientVolume(shouldDuck)
      if (item.type === 'VIDEO') {
        const v = document.createElement('video')
        v.src = item.url
        v.autoplay = true
        v.playsInline = true
        v.volume = Math.max(0, Math.min(1, (item.volumePercent ?? 100) / 100))
        v.onended = () => { setAmbientVolume(false); playNext() }
        v.onerror = () => { setAmbientVolume(false); playNext() }
        container.appendChild(v)
        primaryEl = v
        tryPlay(v)
      } else if (item.type === 'AUDIO') {
        const a = document.createElement('audio')
        a.src = item.url
        a.autoplay = true
        a.preload = 'auto'
        a.loop = !!item.loopPlayback
        a.volume = Math.max(0, Math.min(1, (item.volumePercent ?? 100) / 100))
        a.onended = () => { setAmbientVolume(false); playNext() }
        a.onerror = () => { setAmbientVolume(false); playNext() }
        container.innerHTML = `<div id="logo-screen"><img src="/logo.png" alt="Vaart-E" /></div>`
        container.appendChild(a)
        primaryEl = a
        tryPlay(a)
      } else {
        const img = document.createElement('img')
        img.src = item.url
        img.alt = ''
        img.onerror = () => { setAmbientVolume(false); playNext() }
        container.appendChild(img)
        setTimeout(() => { setAmbientVolume(false); playNext() }, (item.duration || 10) * 1000)
      }
    }

    function showLogo() {
      container.innerHTML = `<div id="logo-screen"><img src="/logo.png" alt="Vaart-E" /></div>`
      setAmbientVolume(false)
    }

    function sendHeartbeat() {
      fetch(`${API_BASE}/api/display/heartbeat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Serial': SERIAL, 'X-SubSerial': SUB_SERIAL },
        body: JSON.stringify({ timestamp: Date.now() })
      }).catch(() => {})
    }

    fetchContent()
    sendHeartbeat()
    setInterval(sendHeartbeat, 60 * 1000)
    setTimeout(() => location.reload(), 6 * 60 * 60 * 1000)
    function unlockAudio() {
      if (ambientEl) tryPlay(ambientEl)
      if (primaryEl) tryPlay(primaryEl)
    }
    document.addEventListener('click', unlockAudio, { passive: true })
    audioGateBtn.addEventListener('click', unlockAudio)
  </script>
</body>
</html>
